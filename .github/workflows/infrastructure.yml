name: 'Infrastructure'

# Runs on every push/PR to main so required status checks are always present.
# Paths-filter inside each job skips real work when nothing relevant changed.
# On push to main (or workflow_dispatch): fmt → validate → apply → ansible ping.
# On pull request:                        fmt → validate → plan.
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

env:
  TF_VERSION: '1.14.4'
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  AWS_REGION: ${{ secrets.AWS_REGION }}
  AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}
  TF_VAR_aws_profile: ''
  TF_VAR_pve1_mgmt_ip: ${{ secrets.TF_VAR_PVE1_MGMT_IP }}
  TF_VAR_caddy_tailscale_ip: ${{ secrets.TF_VAR_CADDY_TAILSCALE_IP }}

jobs:
  terraform-fmt:
    name: 'Terraform Format'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect Terraform changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            terraform:
              - 'terraform/**'
              - '.github/workflows/infrastructure.yml'

      - name: No Terraform changes - marking check as passed
        if: steps.filter.outputs.terraform != 'true'
        run: echo "No Terraform changes in this diff - marking check as passed."

      - name: Setup Terraform
        if: steps.filter.outputs.terraform == 'true'
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Format Check
        if: steps.filter.outputs.terraform == 'true'
        run: terraform fmt -check -recursive
        working-directory: terraform

  terraform-validate:
    name: 'Terraform Validate'
    runs-on: ubuntu-latest
    needs: terraform-fmt
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect Terraform changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            terraform:
              - 'terraform/**'
              - '.github/workflows/infrastructure.yml'

      - name: No Terraform changes - marking check as passed
        if: steps.filter.outputs.terraform != 'true'
        run: echo "No Terraform changes in this diff - marking check as passed."

      - name: Setup Terraform
        if: steps.filter.outputs.terraform == 'true'
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        if: steps.filter.outputs.terraform == 'true'
        run: terraform init -backend=false
        working-directory: terraform

      - name: Terraform Validate
        if: steps.filter.outputs.terraform == 'true'
        run: terraform validate -no-color
        working-directory: terraform

  terraform-plan:
    name: 'Terraform Plan'
    runs-on: ubuntu-latest
    needs: terraform-validate
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect Terraform changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            terraform:
              - 'terraform/**'
              - '.github/workflows/infrastructure.yml'

      - name: No Terraform changes - marking check as passed
        if: steps.filter.outputs.terraform != 'true'
        run: echo "No Terraform changes in this diff - marking check as passed."

      - name: Connect to Tailscale
        if: steps.filter.outputs.terraform == 'true'
        uses: ./.github/actions/tailscale-connect

      - name: Verify Proxmox API connectivity
        if: steps.filter.outputs.terraform == 'true'
        run: |
          API_URL=$(aws ssm get-parameter \
            --name /proxmox/auth/api_url \
            --query Parameter.Value \
            --output text)
          HTTP_CODE=$(curl -s -o /dev/null --max-time 10 -k -w "%{http_code}" "${API_URL}")
          if [ "${HTTP_CODE}" = "000" ]; then
            echo "Cannot reach Proxmox API at ${API_URL} — aborting plan"
            exit 1
          fi
          echo "Proxmox API reachable (HTTP ${HTTP_CODE})"

      - name: Setup Terraform
        if: steps.filter.outputs.terraform == 'true'
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        if: steps.filter.outputs.terraform == 'true'
        run: terraform init
        working-directory: terraform

      - name: Terraform Plan
        id: plan
        if: steps.filter.outputs.terraform == 'true'
        run: |
          set +e
          terraform plan -no-color -out=tfplan 2>&1 | tee plan_full.txt
          PLAN_EXIT_CODE=${PIPESTATUS[0]}
          set -e

          if [ -f tfplan ]; then
            terraform show -no-color tfplan > plan_output.txt
          else
            cp plan_full.txt plan_output.txt
          fi

          if [ "$(wc -c < plan_output.txt)" -gt 60000 ]; then
            {
              echo "Plan output truncated due to size..."
              head -c 30000 plan_output.txt
              echo ""
              echo "... (truncated) ..."
              echo ""
              tail -c 25000 plan_output.txt
            } > plan_truncated.txt
            mv plan_truncated.txt plan_output.txt
          fi

          cp plan_output.txt "$GITHUB_WORKSPACE/plan_output.txt"

          echo "exit_code=$PLAN_EXIT_CODE" >> "$GITHUB_OUTPUT"
          if [ "$PLAN_EXIT_CODE" -ne 0 ]; then
            echo "plan_status=failed" >> "$GITHUB_OUTPUT"
          else
            echo "plan_status=success" >> "$GITHUB_OUTPUT"
          fi

          exit "$PLAN_EXIT_CODE"
        working-directory: terraform
        continue-on-error: true

      - name: Post Plan to PR
        if: steps.filter.outputs.terraform == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          PLAN_OUTPUT=$(cat "$GITHUB_WORKSPACE/plan_output.txt")
          PLAN_STATUS="${{ steps.plan.outputs.plan_status }}"

          if [ "$PLAN_STATUS" = "success" ]; then
            STATUS_EMOJI=":white_check_mark:"
          else
            STATUS_EMOJI=":x:"
          fi

          COMMENT_BODY=$(cat <<EOF
          ## Terraform Plan ${STATUS_EMOJI}

          \`\`\`hcl
          ${PLAN_OUTPUT}
          \`\`\`

          <!-- brooks-security-terraform-plan -->
          EOF
          )

          EXISTING_COMMENT=$(curl -s \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/issues/${PR_NUMBER}/comments" \
            | jq -r '.[] | select(.body | contains("<!-- brooks-security-terraform-plan -->")) | .id' | head -1)

          COMMENT_JSON=$(jq -n --arg body "$COMMENT_BODY" '{"body": $body}')

          if [ -n "$EXISTING_COMMENT" ] && [ "$EXISTING_COMMENT" != "null" ]; then
            curl -s \
              -X PATCH \
              -H "Authorization: token $GITHUB_TOKEN" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/repos/${{ github.repository }}/issues/comments/${EXISTING_COMMENT}" \
              -d "$COMMENT_JSON"
            echo "Updated existing comment"
          else
            curl -s \
              -X POST \
              -H "Authorization: token $GITHUB_TOKEN" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/repos/${{ github.repository }}/issues/${PR_NUMBER}/comments" \
              -d "$COMMENT_JSON"
            echo "Created new comment"
          fi

      - name: Plan Status Check
        if: steps.filter.outputs.terraform == 'true' && steps.plan.outputs.plan_status == 'failed'
        run: exit 1

  terraform-apply:
    name: 'Terraform Apply'
    runs-on: ubuntu-latest
    needs: terraform-validate
    if: (github.ref == 'refs/heads/main' && github.event_name == 'push') || github.event_name == 'workflow_dispatch'
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect Terraform changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            terraform:
              - 'terraform/**'
              - '.github/workflows/infrastructure.yml'

      - name: No Terraform changes - marking check as passed
        if: steps.filter.outputs.terraform != 'true'
        run: echo "No Terraform changes in this diff - marking check as passed."

      - name: Connect to Tailscale
        if: steps.filter.outputs.terraform == 'true'
        uses: ./.github/actions/tailscale-connect

      - name: Verify Proxmox API connectivity
        if: steps.filter.outputs.terraform == 'true'
        run: |
          API_URL=$(aws ssm get-parameter \
            --name /proxmox/auth/api_url \
            --query Parameter.Value \
            --output text)
          HTTP_CODE=$(curl -s -o /dev/null --max-time 10 -k -w "%{http_code}" "${API_URL}")
          if [ "${HTTP_CODE}" = "000" ]; then
            echo "Cannot reach Proxmox API at ${API_URL} — aborting plan"
            exit 1
          fi
          echo "Proxmox API reachable (HTTP ${HTTP_CODE})"

      - name: Setup Terraform
        if: steps.filter.outputs.terraform == 'true'
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        if: steps.filter.outputs.terraform == 'true'
        run: terraform init
        working-directory: terraform

      - name: Terraform Plan (Pre-Apply)
        if: steps.filter.outputs.terraform == 'true'
        run: terraform plan -no-color -out=tfplan
        working-directory: terraform

      - name: Terraform Apply
        if: steps.filter.outputs.terraform == 'true'
        run: terraform apply -auto-approve tfplan
        working-directory: terraform

  ansible-ping:
    name: 'Ansible Ping pve1'
    runs-on: ubuntu-latest
    needs: terraform-apply
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Terraform Init
        run: terraform init
        working-directory: terraform

      - name: Get pve1 Tailscale IP
        id: pve1
        run: |
          PVE1_IP=$(terraform output -raw pve1_tailscale_ip)
          echo "::add-mask::$PVE1_IP"
          echo "ip=$PVE1_IP" >> "$GITHUB_OUTPUT"
        working-directory: terraform

      - name: Connect to Tailscale
        uses: ./.github/actions/tailscale-connect

      - name: Fetch Proxmox SSH credentials from SSM
        run: |
          ROOT_USER=$(aws ssm get-parameter \
            --name /proxmox/auth/root_user \
            --with-decryption \
            --query Parameter.Value \
            --output text)
          ROOT_PASS=$(aws ssm get-parameter \
            --name /proxmox/auth/root_password \
            --with-decryption \
            --query Parameter.Value \
            --output text)
          echo "::add-mask::$ROOT_USER"
          echo "::add-mask::$ROOT_PASS"
          echo "PROXMOX_ROOT_USER=$ROOT_USER" >> "$GITHUB_ENV"
          echo "PROXMOX_ROOT_PASS=$ROOT_PASS" >> "$GITHUB_ENV"

      - name: Install Ansible and sshpass
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y sshpass
          pip install ansible

      - name: Ansible ping pve1
        working-directory: ansible
        run: |
          VARS_FILE=$(mktemp)
          cat > "$VARS_FILE" <<EOF
          ansible_password: "$PROXMOX_ROOT_PASS"
          ansible_ssh_pass: "$PROXMOX_ROOT_PASS"
          EOF
          ansible "${{ steps.pve1.outputs.ip }}" \
            -m ping \
            -u "$PROXMOX_ROOT_USER" \
            -e "@$VARS_FILE"
          rm -f "$VARS_FILE"

  ansible-setup-runner:
    name: 'Setup GitHub Actions Runner'
    runs-on: ubuntu-latest
    needs: terraform-apply
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Terraform Init
        run: terraform init
        working-directory: terraform

      - name: Get runner IP and pve1 Tailscale IP from Terraform output
        id: runner
        run: |
          RUNNER_IP=$(terraform output -raw runner_ip_address)
          PVE1_IP=$(terraform output -raw pve1_tailscale_ip)
          echo "::add-mask::$RUNNER_IP"
          echo "::add-mask::$PVE1_IP"
          echo "ip=$RUNNER_IP" >> "$GITHUB_OUTPUT"
          echo "pve1_ip=$PVE1_IP" >> "$GITHUB_OUTPUT"
        working-directory: terraform

      - name: Connect to Tailscale
        uses: ./.github/actions/tailscale-connect

      - name: Fetch credentials from SSM
        run: |
          RUNNER_TOKEN=$(aws ssm get-parameter \
            --name /github/actions-runner/token \
            --with-decryption \
            --query Parameter.Value \
            --output text)
          ROOT_USER=$(aws ssm get-parameter \
            --name /proxmox/auth/root_user \
            --with-decryption \
            --query Parameter.Value \
            --output text)
          ROOT_PASS=$(aws ssm get-parameter \
            --name /proxmox/auth/root_password \
            --with-decryption \
            --query Parameter.Value \
            --output text)
          echo "::add-mask::$RUNNER_TOKEN"
          echo "::add-mask::$ROOT_USER"
          echo "::add-mask::$ROOT_PASS"
          echo "RUNNER_TOKEN=$RUNNER_TOKEN" >> "$GITHUB_ENV"
          echo "PROXMOX_ROOT_USER=$ROOT_USER" >> "$GITHUB_ENV"
          echo "PROXMOX_ROOT_PASS=$ROOT_PASS" >> "$GITHUB_ENV"

      - name: Install Ansible and sshpass
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y sshpass
          pip install ansible

      - name: Configure container SSH via pve1
        run: |
          export SSHPASS="$PROXMOX_ROOT_PASS"
          sshpass -e ssh -o StrictHostKeyChecking=no \
            "$PROXMOX_ROOT_USER@pve1.prod.brooks-security.com" \
            'pct exec 200 -- bash -c "mkdir -p /etc/ssh/sshd_config.d && printf \"PermitRootLogin yes\nPasswordAuthentication yes\n\" > /etc/ssh/sshd_config.d/99-ansible.conf && systemctl enable ssh --now && systemctl restart ssh"'

      - name: Run GitHub runner playbook
        run: |
          VARS_FILE=$(mktemp)
          cat > "$VARS_FILE" <<EOF
          ansible_user: root
          ansible_password: "$PROXMOX_ROOT_PASS"
          ansible_ssh_pass: "$PROXMOX_ROOT_PASS"
          ansible_ssh_extra_args: "-o StrictHostKeyChecking=no -o ProxyCommand='sshpass -e ssh -W %h:%p -o StrictHostKeyChecking=no $PROXMOX_ROOT_USER@pve1.prod.brooks-security.com'"
          runner_token: "$RUNNER_TOKEN"
          EOF
          export SSHPASS="$PROXMOX_ROOT_PASS"
          ansible-playbook ansible/playbooks/github-runner.yml \
            -i ansible/inventory.yml \
            -e "@$VARS_FILE"
          rm -f "$VARS_FILE"

  ansible-setup-caddy:
    name: 'Setup Caddy Reverse Proxy'
    runs-on: ubuntu-latest
    needs: terraform-apply
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Terraform Init
        run: terraform init
        working-directory: terraform

      - name: Get Caddy IP and pve1 Tailscale IP from Terraform output
        id: caddy
        run: |
          CADDY_IP=$(terraform output -raw caddy_ip_address)
          PVE1_IP=$(terraform output -raw pve1_tailscale_ip)
          PVE1_MGMT_IP=$(terraform output -raw pve1_mgmt_ip)
          echo "::add-mask::$CADDY_IP"
          echo "::add-mask::$PVE1_IP"
          echo "::add-mask::$PVE1_MGMT_IP"
          echo "ip=$CADDY_IP" >> "$GITHUB_OUTPUT"
          echo "pve1_ip=$PVE1_IP" >> "$GITHUB_OUTPUT"
          echo "pve1_mgmt_ip=$PVE1_MGMT_IP" >> "$GITHUB_OUTPUT"
        working-directory: terraform

      - name: Connect to Tailscale
        uses: ./.github/actions/tailscale-connect

      - name: Fetch credentials from SSM
        run: |
          ROOT_USER=$(aws ssm get-parameter \
            --name /proxmox/auth/root_user \
            --with-decryption \
            --query Parameter.Value \
            --output text)
          ROOT_PASS=$(aws ssm get-parameter \
            --name /proxmox/auth/root_password \
            --with-decryption \
            --query Parameter.Value \
            --output text)
          CADDY_KEY_ID=$(aws ssm get-parameter \
            --name /caddy/aws/access_key_id \
            --with-decryption \
            --query Parameter.Value \
            --output text)
          CADDY_KEY_SECRET=$(aws ssm get-parameter \
            --name /caddy/aws/secret_access_key \
            --with-decryption \
            --query Parameter.Value \
            --output text)
          echo "::add-mask::$ROOT_USER"
          echo "::add-mask::$ROOT_PASS"
          echo "::add-mask::$CADDY_KEY_ID"
          echo "::add-mask::$CADDY_KEY_SECRET"
          echo "PROXMOX_ROOT_USER=$ROOT_USER" >> "$GITHUB_ENV"
          echo "PROXMOX_ROOT_PASS=$ROOT_PASS" >> "$GITHUB_ENV"
          echo "CADDY_AWS_ACCESS_KEY_ID=$CADDY_KEY_ID" >> "$GITHUB_ENV"
          echo "CADDY_AWS_SECRET_ACCESS_KEY=$CADDY_KEY_SECRET" >> "$GITHUB_ENV"

      - name: Install Ansible and sshpass
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y sshpass
          pip install ansible

      - name: Configure container SSH via pve1
        run: |
          export SSHPASS="$PROXMOX_ROOT_PASS"
          sshpass -e ssh -o StrictHostKeyChecking=no \
            "$PROXMOX_ROOT_USER@pve1.prod.brooks-security.com" \
            'pct exec 201 -- bash -c "mkdir -p /etc/ssh/sshd_config.d && printf \"PermitRootLogin yes\nPasswordAuthentication yes\n\" > /etc/ssh/sshd_config.d/99-ansible.conf && systemctl enable ssh --now && systemctl restart ssh"'

      - name: Run Caddy playbook
        run: |
          VARS_FILE=$(mktemp)
          cat > "$VARS_FILE" <<EOF
          ansible_user: root
          ansible_password: "$PROXMOX_ROOT_PASS"
          ansible_ssh_pass: "$PROXMOX_ROOT_PASS"
          ansible_ssh_extra_args: "-o StrictHostKeyChecking=no -o ProxyCommand='sshpass -e ssh -W %h:%p -o StrictHostKeyChecking=no $PROXMOX_ROOT_USER@pve1.prod.brooks-security.com'"
          caddy_aws_access_key_id: "$CADDY_AWS_ACCESS_KEY_ID"
          caddy_aws_secret_access_key: "$CADDY_AWS_SECRET_ACCESS_KEY"
          pve1_mgmt_ip: "${{ steps.caddy.outputs.pve1_mgmt_ip }}"
          caddy_acme_email: "graham.brooks@avatarfleet.com"
          EOF
          export SSHPASS="$PROXMOX_ROOT_PASS"
          ansible-playbook ansible/playbooks/caddy.yml \
            -i ansible/inventory.yml \
            -e "@$VARS_FILE"
          rm -f "$VARS_FILE"
