name: 'Infrastructure'

# Runs on every push/PR to main so required status checks are always present.
# Paths-filter inside each job skips real work when nothing relevant changed.
# On push to main (or workflow_dispatch): fmt → validate → apply.
# On pull request:                        fmt → validate → plan.
#
# Manages the AWS website infrastructure only (S3, CloudFront, Route 53, ACM,
# IAM, SSO). Runs on GitHub-hosted runners — no private-network access needed.
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

env:
  TF_VERSION: '1.14.4'
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  AWS_REGION: ${{ secrets.AWS_REGION }}
  AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}
  TF_VAR_aws_profile: ''

jobs:
  terraform-fmt:
    name: 'Terraform Format'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect Terraform changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            terraform:
              - 'terraform/**'
              - '.github/workflows/infrastructure.yml'

      - name: No Terraform changes - marking check as passed
        if: steps.filter.outputs.terraform != 'true'
        run: echo "No Terraform changes in this diff - marking check as passed."

      - name: Setup Terraform
        if: steps.filter.outputs.terraform == 'true'
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Format Check
        if: steps.filter.outputs.terraform == 'true'
        run: terraform fmt -check -recursive
        working-directory: terraform

  terraform-validate:
    name: 'Terraform Validate'
    runs-on: ubuntu-latest
    needs: terraform-fmt
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect Terraform changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            terraform:
              - 'terraform/**'
              - '.github/workflows/infrastructure.yml'

      - name: No Terraform changes - marking check as passed
        if: steps.filter.outputs.terraform != 'true'
        run: echo "No Terraform changes in this diff - marking check as passed."

      - name: Setup Terraform
        if: steps.filter.outputs.terraform == 'true'
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        if: steps.filter.outputs.terraform == 'true'
        run: terraform init -backend=false
        working-directory: terraform

      - name: Terraform Validate
        if: steps.filter.outputs.terraform == 'true'
        run: terraform validate -no-color
        working-directory: terraform

  terraform-plan:
    name: 'Terraform Plan'
    runs-on: ubuntu-latest
    needs: terraform-validate
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect Terraform changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            terraform:
              - 'terraform/**'
              - '.github/workflows/infrastructure.yml'

      - name: No Terraform changes - marking check as passed
        if: steps.filter.outputs.terraform != 'true'
        run: echo "No Terraform changes in this diff - marking check as passed."

      - name: Setup Terraform
        if: steps.filter.outputs.terraform == 'true'
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        if: steps.filter.outputs.terraform == 'true'
        run: terraform init
        working-directory: terraform

      - name: Terraform Plan
        id: plan
        if: steps.filter.outputs.terraform == 'true'
        run: |
          set +e
          terraform plan -no-color -out=tfplan 2>&1 | tee plan_full.txt
          PLAN_EXIT_CODE=${PIPESTATUS[0]}
          set -e

          if [ -f tfplan ]; then
            terraform show -no-color tfplan > plan_output.txt
          else
            cp plan_full.txt plan_output.txt
          fi

          if [ "$(wc -c < plan_output.txt)" -gt 60000 ]; then
            {
              echo "Plan output truncated due to size..."
              head -c 30000 plan_output.txt
              echo ""
              echo "... (truncated) ..."
              echo ""
              tail -c 25000 plan_output.txt
            } > plan_truncated.txt
            mv plan_truncated.txt plan_output.txt
          fi

          cp plan_output.txt "$GITHUB_WORKSPACE/plan_output.txt"

          echo "exit_code=$PLAN_EXIT_CODE" >> "$GITHUB_OUTPUT"
          if [ "$PLAN_EXIT_CODE" -ne 0 ]; then
            echo "plan_status=failed" >> "$GITHUB_OUTPUT"
          else
            echo "plan_status=success" >> "$GITHUB_OUTPUT"
          fi

          exit "$PLAN_EXIT_CODE"
        working-directory: terraform
        continue-on-error: true

      - name: Post Plan to PR
        if: steps.filter.outputs.terraform == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          PLAN_OUTPUT=$(cat "$GITHUB_WORKSPACE/plan_output.txt")
          PLAN_STATUS="${{ steps.plan.outputs.plan_status }}"

          if [ "$PLAN_STATUS" = "success" ]; then
            STATUS_EMOJI=":white_check_mark:"
          else
            STATUS_EMOJI=":x:"
          fi

          COMMENT_BODY=$(cat <<EOF
          ## Terraform Plan ${STATUS_EMOJI}

          \`\`\`hcl
          ${PLAN_OUTPUT}
          \`\`\`

          <!-- brooks-security-terraform-plan -->
          EOF
          )

          EXISTING_COMMENT=$(curl -s \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/issues/${PR_NUMBER}/comments" \
            | jq -r '.[] | select(.body | contains("<!-- brooks-security-terraform-plan -->")) | .id' | head -1)

          COMMENT_JSON=$(jq -n --arg body "$COMMENT_BODY" '{"body": $body}')

          if [ -n "$EXISTING_COMMENT" ] && [ "$EXISTING_COMMENT" != "null" ]; then
            curl -s \
              -X PATCH \
              -H "Authorization: token $GITHUB_TOKEN" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/repos/${{ github.repository }}/issues/comments/${EXISTING_COMMENT}" \
              -d "$COMMENT_JSON"
            echo "Updated existing comment"
          else
            curl -s \
              -X POST \
              -H "Authorization: token $GITHUB_TOKEN" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/repos/${{ github.repository }}/issues/${PR_NUMBER}/comments" \
              -d "$COMMENT_JSON"
            echo "Created new comment"
          fi

      - name: Plan Status Check
        if: steps.filter.outputs.terraform == 'true' && steps.plan.outputs.plan_status == 'failed'
        run: exit 1

  terraform-apply:
    name: 'Terraform Apply'
    runs-on: ubuntu-latest
    needs: terraform-validate
    if: (github.ref == 'refs/heads/main' && github.event_name == 'push') || github.event_name == 'workflow_dispatch'
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect Terraform changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            terraform:
              - 'terraform/**'
              - '.github/workflows/infrastructure.yml'

      - name: No Terraform changes - marking check as passed
        if: steps.filter.outputs.terraform != 'true'
        run: echo "No Terraform changes in this diff - marking check as passed."

      - name: Setup Terraform
        if: steps.filter.outputs.terraform == 'true'
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Build Lambda package
        if: steps.filter.outputs.terraform == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Lambda dependencies
        if: steps.filter.outputs.terraform == 'true'
        working-directory: terraform/files/grc-tools
        run: |
          pip install -r requirements.txt -t . --platform manylinux2014_x86_64 --only-binary=:all: --python-version 3.12 --no-compile --quiet
          rm -rf *.dist-info __pycache__ bin


      - name: Terraform Init
        if: steps.filter.outputs.terraform == 'true'
        run: terraform init
        working-directory: terraform

      - name: Terraform Plan (Pre-Apply)
        if: steps.filter.outputs.terraform == 'true'
        run: terraform plan -no-color -out=tfplan
        working-directory: terraform

      - name: Terraform Apply
        if: steps.filter.outputs.terraform == 'true'
        run: terraform apply -auto-approve tfplan
        working-directory: terraform
