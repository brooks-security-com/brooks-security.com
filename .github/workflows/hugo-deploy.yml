name: 'Hugo Deploy'

# The workflow fires on every push/PR to master so GitHub branch-protection
# "required status checks" always see it run. A `changes` job detects whether
# anything under `hugo/` (or this workflow file) actually changed; the
# downstream jobs short-circuit to success if not. Net effect: the checks are
# always present on every PR, but they finish in seconds and pass cleanly when
# the diff has no Hugo content in it.
on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

permissions:
  contents: read

env:
  # Must be >= 0.158.0 for hugo-book (shortcodes under `layouts/_shortcodes/`).
  # We pull the `extended_withdeploy` edition: extended for the theme's SCSS,
  # withdeploy for the `hugo deploy` subcommand (split out in 0.159.2).
  HUGO_VERSION: '0.160.1'
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  AWS_REGION: ${{ secrets.AWS_REGION }}
  AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}

jobs:
  changes:
    name: 'Detect Changes'
    runs-on: ubuntu-latest
    outputs:
      hugo: ${{ steps.filter.outputs.hugo }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Filter paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            hugo:
              - 'hugo/**'
              - '.github/workflows/hugo-deploy.yml'

  build:
    name: 'Hugo Build'
    runs-on: ubuntu-latest
    needs: changes
    steps:
      - name: No Hugo changes — skipping
        if: needs.changes.outputs.hugo != 'true'
        run: echo "No Hugo changes in this diff — marking check as passed."

      - name: Checkout (with theme submodule)
        if: needs.changes.outputs.hugo == 'true'
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install Hugo (extended)
        if: needs.changes.outputs.hugo == 'true'
        run: |
          # Extract into /tmp because the repo root already has a hugo/ dir,
          # and `tar` refuses to overwrite a directory with the hugo binary.
          curl -fsSL "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_withdeploy_${HUGO_VERSION}_linux-amd64.tar.gz" -o /tmp/hugo.tar.gz
          tar -xzf /tmp/hugo.tar.gz -C /tmp hugo
          sudo mv /tmp/hugo /usr/local/bin/hugo
          hugo version

      - name: Hugo Build (minified)
        if: needs.changes.outputs.hugo == 'true'
        working-directory: hugo
        run: hugo --minify --gc

      - name: Upload build artifact
        if: needs.changes.outputs.hugo == 'true' && github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: actions/upload-artifact@v4
        with:
          name: hugo-public
          path: hugo/public
          retention-days: 1
          if-no-files-found: error

  deploy:
    name: 'Hugo Deploy (S3 + CloudFront)'
    runs-on: ubuntu-latest
    needs: [changes, build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    environment: production
    steps:
      - name: No Hugo changes — skipping
        if: needs.changes.outputs.hugo != 'true'
        run: echo "No Hugo changes in this diff — marking check as passed."

      - name: Checkout (with theme submodule)
        if: needs.changes.outputs.hugo == 'true'
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install Hugo (extended)
        if: needs.changes.outputs.hugo == 'true'
        run: |
          # Extract into /tmp because the repo root already has a hugo/ dir,
          # and `tar` refuses to overwrite a directory with the hugo binary.
          curl -fsSL "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_withdeploy_${HUGO_VERSION}_linux-amd64.tar.gz" -o /tmp/hugo.tar.gz
          tar -xzf /tmp/hugo.tar.gz -C /tmp hugo
          sudo mv /tmp/hugo /usr/local/bin/hugo
          hugo version

      - name: Restore build artifact
        if: needs.changes.outputs.hugo == 'true'
        uses: actions/download-artifact@v4
        with:
          name: hugo-public
          path: hugo/public

      - name: Hugo Deploy (sync S3 + CloudFront invalidation)
        if: needs.changes.outputs.hugo == 'true'
        working-directory: hugo
        # `hugo deploy` reads the [deployment] block in hugo.toml:
        #   target "brooks-security" -> s3://brooks-security.com?region=us-east-1
        #   cloudFrontDistributionID = "E1QZQDBCV5WT01"
        # With AWS_* env vars set, gocloud.dev uses the standard AWS credential
        # chain -- no profile needed.
        run: hugo deploy --target brooks-security --maxDeletes -1 --invalidateCDN
