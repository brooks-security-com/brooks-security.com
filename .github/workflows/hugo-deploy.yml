name: 'Hugo Deploy'

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  HUGO_VERSION: '0.160.1'
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  AWS_REGION: ${{ secrets.AWS_REGION }}
  AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}
  GH_LOGIN: 'littleseneca'
  GH_CONTRIB_SSM_PARAM: '/github/admin_token'

jobs:
  build:
    name: 'Hugo Build'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (with theme submodule)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Detect Hugo changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            hugo:
              - 'hugo/**'
              - '.github/workflows/hugo-deploy.yml'

      - name: Decide whether to run
        id: gate
        run: |
          if [ "${{ steps.filter.outputs.hugo }}" = "true" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: No Hugo changes - marking check as passed
        if: steps.gate.outputs.run != 'true'
        run: echo "No Hugo changes in this diff - marking check as passed."

      - name: Fetch GitHub contributions
        if: steps.gate.outputs.run == 'true'
        run: |
          set -uo pipefail
          TOKEN="$(aws ssm get-parameter --name "$GH_CONTRIB_SSM_PARAM" --with-decryption --query 'Parameter.Value' --output text 2>/dev/null || true)"
          if [ -z "$TOKEN" ] || [ "$TOKEN" = "None" ]; then
            echo "::warning::Could not read $GH_CONTRIB_SSM_PARAM from SSM; keeping committed contributions.json"
            exit 0
          fi
          QUERY='query($login:String!){user(login:$login){contributionsCollection{contributionCalendar{totalContributions weeks{contributionDays{date contributionCount contributionLevel weekday}}}}}}'
          jq -n --arg q "$QUERY" --arg login "$GH_LOGIN" '{query:$q,variables:{login:$login}}' > /tmp/gql.json
          HTTP="$(curl -sS -w '%{http_code}' -o /tmp/resp.json \
            -H "Authorization: bearer $TOKEN" -H "Content-Type: application/json" \
            -X POST --data @/tmp/gql.json https://api.github.com/graphql || echo 000)"
          if [ "$HTTP" != "200" ]; then
            echo "::warning::GitHub GraphQL returned HTTP $HTTP; keeping committed contributions.json"
            exit 0
          fi
          if jq -e '.data.user.contributionsCollection.contributionCalendar.weeks | length > 0' /tmp/resp.json >/dev/null 2>&1; then
            jq '{
              total: .data.user.contributionsCollection.contributionCalendar.totalContributions,
              weeks: [ .data.user.contributionsCollection.contributionCalendar.weeks[]
                       | { days: [ .contributionDays[]
                           | { date, count: .contributionCount, level: .contributionLevel, weekday } ] } ]
            }' /tmp/resp.json > hugo/data/contributions.json
            echo "Baked $(jq '.weeks | length' hugo/data/contributions.json) weeks, $(jq -r '.total' hugo/data/contributions.json) total contributions."
          else
            echo "::warning::GraphQL response had no contribution weeks; keeping committed contributions.json"
            jq -c '.errors // empty' /tmp/resp.json || true
          fi

      - name: Install Hugo (extended)
        if: steps.gate.outputs.run == 'true'
        run: |
          curl -fsSL "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_withdeploy_${HUGO_VERSION}_linux-amd64.tar.gz" -o /tmp/hugo.tar.gz
          tar -xzf /tmp/hugo.tar.gz -C /tmp hugo
          mkdir -p "$HOME/.local/bin"
          mv /tmp/hugo "$HOME/.local/bin/hugo"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          "$HOME/.local/bin/hugo" version

      - name: Inject reCAPTCHA site key
        if: steps.gate.outputs.run == 'true'
        run: |
          set -uo pipefail
          KEY="$(aws ssm get-parameter --name "/brooks-security.com/recaptcha/site_key" --with-decryption --query 'Parameter.Value' --output text 2>/dev/null || true)"
          if [ -z "$KEY" ] || [ "$KEY" = "None" ]; then
            echo "::warning::Could not read recaptcha site_key from SSM; contact form will render its dev-mode notice"
          else
            echo "HUGO_PARAMS_RECAPTCHASITEKEY=$KEY" >> "$GITHUB_ENV"
            echo "Injected reCAPTCHA site key into Hugo params."
          fi

      - name: Hugo Build (minified)
        if: steps.gate.outputs.run == 'true'
        working-directory: hugo
        run: hugo --minify --gc

      - name: Upload build artifact
        if: steps.gate.outputs.run == 'true' && (github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main'))
        uses: actions/upload-artifact@v4
        with:
          name: hugo-public
          path: hugo/public
          retention-days: 1
          if-no-files-found: error

  deploy:
    name: 'Hugo Deploy (S3 + CloudFront)'
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    environment: production
    steps:
      - name: Checkout (with theme submodule)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Detect Hugo changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            hugo:
              - 'hugo/**'
              - '.github/workflows/hugo-deploy.yml'

      - name: Decide whether to run
        id: gate
        run: |
          if [ "${{ steps.filter.outputs.hugo }}" = "true" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: No Hugo changes - marking check as passed
        if: steps.gate.outputs.run != 'true'
        run: echo "No Hugo changes in this diff - marking check as passed."

      - name: Install Hugo (extended)
        if: steps.gate.outputs.run == 'true'
        run: |
          curl -fsSL "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_withdeploy_${HUGO_VERSION}_linux-amd64.tar.gz" -o /tmp/hugo.tar.gz
          tar -xzf /tmp/hugo.tar.gz -C /tmp hugo
          mkdir -p "$HOME/.local/bin"
          mv /tmp/hugo "$HOME/.local/bin/hugo"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          "$HOME/.local/bin/hugo" version

      - name: Restore build artifact
        if: steps.gate.outputs.run == 'true'
        uses: actions/download-artifact@v4
        with:
          name: hugo-public
          path: hugo/public

      - name: Hugo Deploy (sync S3 + CloudFront invalidation)
        if: steps.gate.outputs.run == 'true'
        working-directory: hugo
        run: hugo deploy --target brooks-security --maxDeletes -1 --invalidateCDN

  terraform:
    name: 'Terraform Apply'
    runs-on: ubuntu-latest
    needs: deploy
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Detect terraform changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            terraform:
              - 'terraform/**'
              - '.github/workflows/hugo-deploy.yml'

      - name: Decide whether to run
        id: gate
        run: |
          if [ "${{ steps.filter.outputs.terraform }}" = "true" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: No terraform changes
        if: steps.gate.outputs.run != 'true'
        run: echo "No terraform changes in this diff."

      - uses: hashicorp/setup-terraform@v3
        if: steps.gate.outputs.run == 'true'
        with:
          terraform_version: '1.9.0'

      - uses: actions/setup-python@v5
        if: steps.gate.outputs.run == 'true'
        with:
          python-version: '3.12'

      - name: Build Lambda package (pip install deps)
        if: steps.gate.outputs.run == 'true'
        working-directory: terraform/files/grc-tools
        run: |
          pip install \
            -r requirements.txt \
            -t . \
            --platform manylinux2014_x86_64 \
            --only-binary=:all: \
            --python-version 3.12 \
            --no-compile \
            --quiet
          rm -rf *.dist-info __pycache__ bin

      - name: Terraform Init
        if: steps.gate.outputs.run == 'true'
        working-directory: terraform
        run: terraform init -backend=false

      - name: Terraform fmt check
        if: steps.gate.outputs.run == 'true'
        working-directory: terraform
        run: terraform fmt -check -recursive

      - name: Terraform Apply
        if: steps.gate.outputs.run == 'true'
        working-directory: terraform
        run: terraform apply -auto-approve
        env:
          TF_VAR_aws_profile: ''
