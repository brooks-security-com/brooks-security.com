baseURL = 'https://www.brooks-security.com/'
languageCode = 'en-us'
title = 'Graham Brooks'
theme = 'hugo-book'

[params]
BookLogo = 'grahambrooks.png'
# Public reCAPTCHA v3 site key. Empty here on purpose: injected at build time
# from SSM (/brooks-security.com/recaptcha/site_key) via the
# HUGO_PARAMS_RECAPTCHASITEKEY env var (see .github/workflows/hugo-deploy.yml).
# When empty, the contact-form shortcode renders a dev-mode notice.
recaptchaSiteKey = ''

[markup.goldmark.renderer]
unsafe = true

[deployment] # Deployment settings start here
  # Target configuration for S3
  [[deployment.targets]]
    name = "brooks-security"
    URL = "s3://brooks-security.com?region=us-east-1"
    cloudFrontDistributionID = "E1QZQDBCV5WT01"

  # Matchers for deployment
  [[deployment.matchers]]
    # Example: Cache-Control headers for images
    pattern = "^.+\\.(jpg|jpeg|png|gif|webp|svg)$"
    cacheControl = "max-age=31536000, no-transform, public"
    gzip = true

  [[deployment.matchers]]
    # Example: Cache-Control for CSS and JS
    pattern = "^.+\\.(css|js)$"
    cacheControl = "max-age=31536000, no-transform, public"
    gzip = true
