---
- name: Configure code-server
  hosts: code-server
  become: true
  vars:
    code_server_port: 8080
    coder_user: coder
    coder_home: /home/coder
    workspace_dir: /home/coder/workspace

  tasks:
    - name: Install base packages
      apt:
        name:
          - curl
          - ca-certificates
          - git
          - wget
        state: present
        update_cache: true

    - name: Create coder group
      group:
        name: "{{ coder_user }}"
        system: false

    - name: Create coder user
      user:
        name: "{{ coder_user }}"
        group: "{{ coder_user }}"
        home: "{{ coder_home }}"
        shell: /bin/bash
        create_home: true

    - name: Set workspace ownership
      file:
        path: "{{ workspace_dir }}"
        state: directory
        owner: "{{ coder_user }}"
        group: "{{ coder_user }}"
        mode: "0755"

    - name: Install code-server
      shell: curl -fsSL https://code-server.dev/install.sh | sh
      args:
        creates: /usr/bin/code-server

    - name: Create code-server config directory
      file:
        path: "{{ coder_home }}/.config/code-server"
        state: directory
        owner: "{{ coder_user }}"
        group: "{{ coder_user }}"
        mode: "0700"

    - name: Write code-server config
      copy:
        dest: "{{ coder_home }}/.config/code-server/config.yaml"
        owner: "{{ coder_user }}"
        group: "{{ coder_user }}"
        mode: "0600"
        content: |
          bind-addr: 0.0.0.0:{{ code_server_port }}
          auth: password
          password: {{ code_server_password }}
          cert: false
      no_log: true
      notify: Restart code-server

    - name: Enable and start code-server
      systemd:
        name: "code-server@{{ coder_user }}"
        enabled: true
        state: started
        daemon_reload: true

    - name: Install Tailscale
      shell: curl -fsSL https://tailscale.com/install.sh | sh
      args:
        creates: /usr/bin/tailscale

    - name: Enable tailscaled
      systemd:
        name: tailscaled
        enabled: true
        state: started
        daemon_reload: true

    - name: Join tailnet
      command: >
        tailscale up
          --authkey={{ tailscale_auth_key }}
          --advertise-tags=tag:code-server
          --accept-routes
      no_log: true
      register: tailscale_up
      changed_when: tailscale_up.rc == 0
      failed_when: tailscale_up.rc != 0

  handlers:
    - name: Restart code-server
      systemd:
        name: "code-server@{{ coder_user }}"
        state: restarted
        daemon_reload: true
