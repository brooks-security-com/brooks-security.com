---
- name: Configure Caddy reverse proxy
  hosts: all
  become: true
  vars:
    caddy_config_dir: /etc/caddy
    caddy_data_dir: /var/lib/caddy
    caddy_log_dir: /var/log/caddy

  tasks:
    - name: Install build dependencies
      apt:
        name:
          - curl
          - ca-certificates
          - debian-keyring
          - debian-archive-keyring
          - apt-transport-https
          - golang-go
        state: present
        update_cache: true

    - name: Add xcaddy GPG key
      shell: |
        curl -1sLf 'https://dl.cloudsmith.io/public/caddy/xcaddy/gpg.key' | \
          gpg --dearmor -o /usr/share/keyrings/caddy-xcaddy-archive-keyring.gpg
      args:
        creates: /usr/share/keyrings/caddy-xcaddy-archive-keyring.gpg

    - name: Add xcaddy apt repository
      shell: |
        curl -1sLf 'https://dl.cloudsmith.io/public/caddy/xcaddy/debian.deb.txt' | \
          tee /etc/apt/sources.list.d/caddy-xcaddy.list
      args:
        creates: /etc/apt/sources.list.d/caddy-xcaddy.list

    - name: Install xcaddy
      apt:
        name: xcaddy
        state: present
        update_cache: true

    - name: Build Caddy with route53 DNS plugin
      command: xcaddy build --with github.com/caddy-dns/route53 --output /usr/bin/caddy
      args:
        creates: /usr/bin/caddy
      environment:
        HOME: /root
        GOPATH: /root/go

    - name: Create caddy group
      group:
        name: caddy
        system: true

    - name: Create caddy user
      user:
        name: caddy
        group: caddy
        system: true
        home: "{{ caddy_data_dir }}"
        shell: /usr/sbin/nologin
        create_home: false

    - name: Create Caddy directories
      file:
        path: "{{ item.path }}"
        state: directory
        owner: "{{ item.owner }}"
        group: caddy
        mode: "{{ item.mode }}"
      loop:
        - { path: "{{ caddy_config_dir }}", owner: root, mode: "0755" }
        - { path: "{{ caddy_data_dir }}", owner: caddy, mode: "0700" }
        - { path: "{{ caddy_log_dir }}", owner: caddy, mode: "0755" }

    - name: Write Caddyfile
      template:
        src: "{{ playbook_dir }}/../templates/Caddyfile.j2"
        dest: "{{ caddy_config_dir }}/Caddyfile"
        owner: root
        group: caddy
        mode: "0640"
      notify: Reload Caddy

    - name: Write AWS credentials environment file
      template:
        src: "{{ playbook_dir }}/../templates/caddy-aws.env.j2"
        dest: "{{ caddy_config_dir }}/aws.env"
        owner: root
        group: caddy
        mode: "0640"
      notify: Restart Caddy
      no_log: true

    - name: Write systemd service
      copy:
        dest: /etc/systemd/system/caddy.service
        mode: "0644"
        content: |
          [Unit]
          Description=Caddy
          Documentation=https://caddyserver.com/docs/
          After=network.target network-online.target
          Requires=network-online.target

          [Service]
          Type=notify
          User=caddy
          Group=caddy
          ExecStart=/usr/bin/caddy run --environ --config /etc/caddy/Caddyfile
          ExecReload=/usr/bin/caddy reload --config /etc/caddy/Caddyfile --force
          TimeoutStopSec=5s
          LimitNOFILE=1048576
          PrivateTmp=true
          ProtectSystem=strict
          ReadWritePaths=/var/log/caddy /var/lib/caddy
          AmbientCapabilities=CAP_NET_BIND_SERVICE
          EnvironmentFile=/etc/caddy/aws.env

          [Install]
          WantedBy=multi-user.target
      notify: Restart Caddy

    - name: Start and enable Caddy
      systemd:
        name: caddy
        state: started
        enabled: true
        daemon_reload: true

  handlers:
    - name: Reload Caddy
      systemd:
        name: caddy
        state: reloaded

    - name: Restart Caddy
      systemd:
        name: caddy
        state: restarted
        daemon_reload: true
